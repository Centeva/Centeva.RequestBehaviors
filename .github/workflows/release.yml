name: Release
on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  package:
    name: Publish Package

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify commit is on main for safety
        run: |
          git fetch origin main
          git merge-base --is-ancestor HEAD origin/main || { echo "ERROR: Release tag does not point to a commit on origin/main."; exit 1; }

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x
          source-url: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # DOTNET_INSTALL_DIR: '${{ runner.temp }}/dotnet'  # Uncomment for self-hosted runners without .NET pre-installed

      - name: Build
        run: dotnet build --configuration Release /p:Version=${GITHUB_REF_NAME#v}

      - name: Test
        run: dotnet test --configuration Release /p:Version=${GITHUB_REF_NAME#v} --no-build

      - name: Package
        run: dotnet pack --configuration Release /p:Version=${GITHUB_REF_NAME#v} --no-build --output packages

      - name: Push to GitHub Packages (pre-release only)
        if: github.event.release.prerelease
        run: dotnet nuget push packages/*.nupkg --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --api-key ${{ secrets.GITHUB_TOKEN }}

      - name: Push to nuget.org (stable only)
        if: "!github.event.release.prerelease"
        run: dotnet nuget push packages/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
